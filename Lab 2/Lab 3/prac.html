<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="prac.css">
</head>
<body>
    <fieldset id="field">
        <legend id="legend">Student Information</legend>
        
        <table id="table">
            <tr id="td1">
                <td>Full Name(Text)</td>
                <td class="left">Email Address</td>
                
            </tr>

            <tr>
                
                <td><input type="text" name="last_name" id="name" placeholder="Enter your full name"></td>
                <td><input type="text" name="email" id="email" placeholder="your email@example.com" class="left"></td>
            </tr>

            <tr id="td2">
                <td>Password</td>
                <td class="left">Age(Number)</td>
                
            </tr>

            <tr>
                <td><input type="tel" name="phone_number" placeholder="Enter secure password" id="pass"></td>
                <td><input type="number" name="age" id="age" placeholder="Enter your age" class="left"></td>
            </tr>
            
            <tr id="td3">
                <td>Experiment Date</td>
                <td class="left">Phone Number (Tel)</td>
               
            </tr>

            <tr>
                
                <td><input type="date" name="email" id="date"></td>
                <td><input type="number" name="tel" id="phone" placeholder="+088 XXXX XXXXX" class="left"></td>
            </tr>
        
        </table>

    </fieldset>
<div>
    <button id="btn1" >SUBMIT</button>
    <button id="btn2">CLEAR</button>

</div>

    
</body>
</html>
